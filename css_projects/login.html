<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <img src="logo.png" alt="Sandeep Patel" class="logo_login">
    <form class="form">
        <label for="username" class="user">Username:</label>
        <input type="text" id="username" name="username" required placeholder="sandeep patel"><br>
        <label for="password" class="user">Password:</label>
        <input type="password" id="password" name="password" required placeholder="••••••••"><br>
    </form>
    <input type="submit" value="Login" class="login_btn">
</body>
</html>
