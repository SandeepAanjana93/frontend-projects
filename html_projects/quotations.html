<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- blockquote -->
    <blockquote>
        <p>This is a blockquote.</p>
    </blockquote>
    <!-- q -->
    <q>This is a q.</q>
    <!-- abbr -->
    <abbr title="hyper text markup language">HTML</abbr>
    <!-- address -->
    <address>
        <p>This is an address.</p>
    </address>
    <!-- bdo -->
    <bdo dir="rtl">
        <p>This is a bdo.</p>
    </bdo>
    <!-- site -->
    <p>This is a site.</p>
</body>
</html>
