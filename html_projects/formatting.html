<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=paragraph, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- bold -->
    <p>hyper text markup language<b>HTML</b></p>
    <!-- strong -->
    <p>hyper text markup language<strong>HTML</strong></p>
    <!-- italic -->
    <p>hyper text markup language<i>HTML</i></p>
    <!-- em -->
    <p>hyper text markup language<em>HTML</em></p>
    <!-- mark -->
    <p>hyper text markup language<mark>HTML</mark></p>
    <!-- small -->
    <p><small>hyper text markup language</small>HTML</p>
    <!-- sup -->
    <p>2<sup>2</sup></p>
    <!-- sub -->
    <p>H<sub>2</sub>O</p>
    <!-- del -->
    <p>hello <del>coders</del> <ins>world</ins></p>
    <!-- ins -->
    <p>my name is <u>sandeep patel</u></p>

</body>
</html>
