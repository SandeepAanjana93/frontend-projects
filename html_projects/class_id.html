<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .greet {
            color: red;
            font-weight: bold;
            font-size: larger;
        }
        #one {
            color: blue;
        }
        #two {
            color: green;
        }
        #three {
            color: purple;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- class selector -->
    <div class="greet">
        <p>hello world</p>
    </div>
    <div class="greet">
        <p>hello coders</p>
    </div>
    <div class="greet">
        <p>hello html</p>
    </div>
    <!-- id selector -->
    <div id="one">
        <p>hello world</p>
    </div>
    <div id="two">
        <p>hello coders</p>
    </div>
    <div id="three">
        <p>hello html</p>
    </div>
</body>
</html>
